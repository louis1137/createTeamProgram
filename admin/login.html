<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Login</title>
	<link rel="stylesheet" href="admin.css">
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
	<style>
		.login-shell {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 16px;
		}

		.login-card {
			width: 100%;
			max-width: 420px;
			border: 1px solid var(--line);
			background: var(--panel);
			padding: 20px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.login-card h1 {
			margin: 0;
			font-size: 20px;
		}

		.login-card p {
			margin: 0;
			font-size: 13px;
			color: var(--muted);
		}

		.login-input {
			width: 100%;
			height: 38px;
			padding: 9px 10px;
			border: 1px solid var(--line);
			background: var(--panel-2);
			color: var(--text);
			outline: none;
		}

		.login-error {
			margin-top: 10px;
			min-height: 20px;
			font-size: 12px;
			color: var(--muted);
		}

		.remember-row {
			display: flex;
			align-items: center;
			gap: 6px;
			margin-top: 10px;
			font-size: 12px;
			color: var(--muted);
		}

		.login-actions {
			display: flex;
			justify-content: flex-end;
		}

		.login-section.hidden {
			display: none;
		}

		.login-change-wrap {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.change-toggle {
			display: inline-flex;
			align-self: center;
			padding: 0;
			border: none;
			background: transparent;
			color: #5f6576;
			font-size: 13px;
			text-decoration: underline;
			cursor: pointer;
		}

		.change-toggle.hidden {
			display: none;
		}

		.change-form {
			display: none;
			flex-direction: column;
			gap: 8px;
			padding: 10px;
			border: 1px solid var(--line);
			background: var(--panel-2);
		}

		.change-form.show {
			display: flex;
		}

		.change-actions {
			display: flex;
			justify-content: flex-end;
			gap: 8px;
		}

		.change-message {
			min-height: 18px;
			font-size: 12px;
			color: var(--muted);
		}
	</style>
</head>
<body>
	<div class="login-shell">
		<form id="adminLoginForm" class="login-card" autocomplete="off">
			<h1>관리자 로그인</h1>
			<p>비밀번호를 입력하면 관리자 페이지로 이동합니다.</p>
			<div id="loginSection" class="login-section">
				<input id="adminPasswordInput" class="login-input" type="password" placeholder="비밀번호" required>
				<label class="remember-row" for="rememberPasswordCheck">
					<input id="rememberPasswordCheck" type="checkbox">
					<span>비밀번호 기억하기</span>
				</label>
				<div id="loginErrorText" class="login-error" role="status" aria-live="polite"></div>
				<div class="login-actions">
					<button class="btn" type="submit">로그인</button>
				</div>
			</div>
			<div class="login-change-wrap">
				<button id="showChangePasswordBtn" class="change-toggle" type="button">비밀번호 변경</button>
				<div id="changePasswordForm" class="change-form">
					<input id="currentPasswordInput" class="login-input" type="password" placeholder="기존 비밀번호" autocomplete="off">
					<input id="newPasswordInput" class="login-input" type="password" placeholder="새 비밀번호 입력" autocomplete="off">
					<input id="confirmPasswordInput" class="login-input" type="password" placeholder="새 비밀번호 확인" autocomplete="off">
					<div id="changePasswordMessage" class="change-message" role="status" aria-live="polite"></div>
					<div class="change-actions">
						<button id="submitChangePasswordBtn" class="btn" type="button">변경 저장</button>
						<button id="cancelChangePasswordBtn" class="btn btn-secondary" type="button">취소</button>
					</div>
				</div>
			</div>
		</form>
	</div>

	<script>
		const ADMIN_ACCESS_SESSION_KEY = 'adminAccessAuthenticated';
		const ADMIN_REMEMBER_PASSWORD_KEY = 'adminRememberPasswordValue';
		const ADMIN_REMEMBER_PASSWORD_AT_KEY = 'adminRememberPasswordAt';
		const ADMIN_REMEMBER_PASSWORD_ENABLED_KEY = 'adminRememberPasswordEnabled';
		const REMEMBER_PASSWORD_EXPIRE_MS = 30 * 24 * 60 * 60 * 1000;
		const GLOBAL_APP_PASSWORD_PATH = 'admin/password';
		const LEGACY_GLOBAL_APP_PASSWORD_PATHS = [
			'settings/globalPassword',
			'profiles/__global_admin__/password',
			'profile/__global_admin__/password'
		];
		const DEFAULT_ADMIN_ACCESS_PASSWORD = 'admin1234';

		const firebaseConfig = {
			apiKey: "AIzaSyAdUEAHg08-FheJjawYwIPRov4105qdG0o",
			authDomain: "createteamprogram.firebaseapp.com",
			databaseURL: "https://createteamprogram-default-rtdb.asia-southeast1.firebasedatabase.app",
			projectId: "createteamprogram",
			storageBucket: "createteamprogram.firebasestorage.app",
			messagingSenderId: "108758586522",
			appId: "1:108758586522:web:75386ff04fa79121a0bb23",
			measurementId: "G-N7D10Q7MNF"
		};

		let loginDatabase = null;

		function initLoginFirebase() {
			if (typeof firebase === 'undefined') {
				return;
			}
			const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
			loginDatabase = app.database();
		}

		async function getAdminAccessPassword() {
			if (!loginDatabase) {
				return DEFAULT_ADMIN_ACCESS_PASSWORD;
			}
			try {
				const snapshot = await loginDatabase.ref(GLOBAL_APP_PASSWORD_PATH).once('value');
				const value = snapshot.val();
				if (typeof value === 'string' && value.length > 0) {
					return value;
				}
				for (const path of LEGACY_GLOBAL_APP_PASSWORD_PATHS) {
					try {
						const legacySnapshot = await loginDatabase.ref(path).once('value');
						const legacyValue = legacySnapshot.val();
						if (typeof legacyValue === 'string' && legacyValue.length > 0) {
							return legacyValue;
						}
					} catch (legacyError) {
						continue;
					}
				}
				return DEFAULT_ADMIN_ACCESS_PASSWORD;
			} catch (error) {
				return DEFAULT_ADMIN_ACCESS_PASSWORD;
			}
		}

		async function setAdminAccessPassword(password) {
			if (!loginDatabase) {
				throw new Error('Firebase 연결에 실패했습니다.');
			}
			await loginDatabase.ref(GLOBAL_APP_PASSWORD_PATH).set(password);
		}

		function redirectToAdmin() {
			window.location.replace('index.html');
		}

		if (window.sessionStorage.getItem(ADMIN_ACCESS_SESSION_KEY) === 'true') {
			redirectToAdmin();
		}

		initLoginFirebase();

		const form = document.getElementById('adminLoginForm');
		const loginSection = document.getElementById('loginSection');
		const passwordInput = document.getElementById('adminPasswordInput');
		const rememberPasswordCheck = document.getElementById('rememberPasswordCheck');
		const errorText = document.getElementById('loginErrorText');
		const showChangePasswordBtn = document.getElementById('showChangePasswordBtn');
		const changePasswordForm = document.getElementById('changePasswordForm');
		const currentPasswordInput = document.getElementById('currentPasswordInput');
		const newPasswordInput = document.getElementById('newPasswordInput');
		const confirmPasswordInput = document.getElementById('confirmPasswordInput');
		const changePasswordMessage = document.getElementById('changePasswordMessage');
		const cancelChangePasswordBtn = document.getElementById('cancelChangePasswordBtn');
		const submitChangePasswordBtn = document.getElementById('submitChangePasswordBtn');

		function setChangePasswordMode(enabled) {
			changePasswordForm.classList.toggle('show', enabled);
			loginSection.classList.toggle('hidden', enabled);
			showChangePasswordBtn.classList.toggle('hidden', enabled);
			changePasswordMessage.textContent = '';
			if (enabled) {
				currentPasswordInput.focus();
				return;
			}
			currentPasswordInput.value = '';
			newPasswordInput.value = '';
			confirmPasswordInput.value = '';
			passwordInput.focus();
		}

		function clearRememberedPassword() {
			window.localStorage.removeItem(ADMIN_REMEMBER_PASSWORD_KEY);
			window.localStorage.removeItem(ADMIN_REMEMBER_PASSWORD_AT_KEY);
			window.localStorage.removeItem(ADMIN_REMEMBER_PASSWORD_ENABLED_KEY);
		}

		function loadRememberedPassword() {
			const rememberEnabled = window.localStorage.getItem(ADMIN_REMEMBER_PASSWORD_ENABLED_KEY) === 'true';
			const rememberedAt = Number(window.localStorage.getItem(ADMIN_REMEMBER_PASSWORD_AT_KEY) || '0');
			const expired = !rememberedAt || (Date.now() - rememberedAt > REMEMBER_PASSWORD_EXPIRE_MS);

			if (!rememberEnabled || expired) {
				clearRememberedPassword();
				rememberPasswordCheck.checked = false;
				return;
			}

			const rememberedPassword = window.localStorage.getItem(ADMIN_REMEMBER_PASSWORD_KEY) || '';
			if (!rememberedPassword) {
				clearRememberedPassword();
				rememberPasswordCheck.checked = false;
				return;
			}

			rememberPasswordCheck.checked = true;
			passwordInput.value = rememberedPassword;
		}

		form.addEventListener('submit', async (event) => {
			event.preventDefault();
			errorText.textContent = '';
			const entered = passwordInput.value;
			const savedPassword = await getAdminAccessPassword();
			if (entered !== savedPassword) {
				errorText.textContent = '비밀번호가 올바르지 않습니다.';
				passwordInput.value = '';
				passwordInput.focus();
				return;
			}
			window.sessionStorage.setItem(ADMIN_ACCESS_SESSION_KEY, 'true');
			if (rememberPasswordCheck.checked) {
				window.localStorage.setItem(ADMIN_REMEMBER_PASSWORD_KEY, entered);
				window.localStorage.setItem(ADMIN_REMEMBER_PASSWORD_AT_KEY, String(Date.now()));
				window.localStorage.setItem(ADMIN_REMEMBER_PASSWORD_ENABLED_KEY, 'true');
			} else {
				clearRememberedPassword();
			}
			redirectToAdmin();
		});

		showChangePasswordBtn.addEventListener('click', () => {
			const isOpen = changePasswordForm.classList.contains('show');
			setChangePasswordMode(!isOpen);
		});

		cancelChangePasswordBtn.addEventListener('click', () => {
			setChangePasswordMode(false);
		});

		submitChangePasswordBtn.addEventListener('click', async () => {
			changePasswordMessage.textContent = '';
			const currentPassword = currentPasswordInput.value;
			const newPassword = newPasswordInput.value;
			const confirmPassword = confirmPasswordInput.value;
			const savedPassword = await getAdminAccessPassword();

			if (currentPassword !== savedPassword) {
				changePasswordMessage.textContent = '기존 비밀번호가 올바르지 않습니다.';
				currentPasswordInput.focus();
				return;
			}

			if (!newPassword || newPassword.trim().length === 0) {
				changePasswordMessage.textContent = '새 비밀번호를 입력하세요.';
				newPasswordInput.focus();
				return;
			}

			if (newPassword !== confirmPassword) {
				changePasswordMessage.textContent = '새 비밀번호 확인이 일치하지 않습니다.';
				confirmPasswordInput.focus();
				return;
			}

			try {
				await setAdminAccessPassword(newPassword);
			} catch (error) {
				changePasswordMessage.textContent = '비밀번호 변경에 실패했습니다.';
				return;
			}
			clearRememberedPassword();
			rememberPasswordCheck.checked = false;
			passwordInput.value = '';
			changePasswordMessage.textContent = '비밀번호가 변경되었습니다.';
			setChangePasswordMode(false);
		});

		loadRememberedPassword();
		passwordInput.focus();
	</script>
</body>
</html>
